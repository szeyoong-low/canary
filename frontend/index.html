<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canary</title>
    <script>
      // Runs synchronously before <body> and React to prevent FOUC.
      // The constants must match src/components/ThemeToggle.tsx.
      const dark = "dark";
      const light = "light";
      const darkMediaQuery = `(prefers-color-scheme: ${dark})`;
      const themeKey = "theme";

      const stored = localStorage.getItem(themeKey);
      const theme =
        stored === light || stored === dark
          ? stored
          : window.matchMedia(darkMediaQuery).matches
            ? dark
            : light;
      document.documentElement.dataset.theme = theme;
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
