name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install all dependencies
        run: npm ci
      - name: Format code with prettier
        run: npx prettier . --check
      - name: Lint code with ESLint
        run: npm run lint
      - name: Typescript compiler type check and Vite bundle
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install all dependencies
        run: uv sync --dev
      - name: Check code formatting with ruff
        run: uv run ruff format --check .
      - name: Lint code with ruff
        run: uv run ruff check .
      - name: Run test suite
        run: uv run pytest

  deploy-backend:
    runs-on: ubuntu-latest
    needs: backend             # only runs if backend lint passes
    steps:
      - uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway preview
        run: railway up --service canary --environment preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PREVIEW_TOKEN }}