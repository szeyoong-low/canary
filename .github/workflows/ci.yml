name: CI

on: workflow_dispatch

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci          # installs exact versions from package-lock.json
      - run: npm run lint    # ESLint
      - run: npm run build   # tsc type check + Vite bundle

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - run: uv sync --dev       # installs all deps including ruff
      - run: uv run ruff check . # lint
      - run: uv run ruff format --check .  # formatting

  deploy-backend:
    runs-on: ubuntu-latest
    needs: backend             # only runs if backend lint passes
    steps:
      - uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway preview
        run: railway up --service canary --environment preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PREVIEW_TOKEN }}